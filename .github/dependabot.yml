version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      aspire:
        patterns: ["Aspire.*"]
      resilience:
        patterns: ["Polly.*", "Microsoft.Extensions.Http.Resilience"]
      opentelemetry:
        patterns: ["OpenTelemetry.*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      # EnforceCodeStyleInBuild + TreatWarningsAsErrors turn analyzer/style issues into build
      # failures. Chaos/integration tests need Docker and run locally; CI guarantees compilation.
      - name: Build
        run: dotnet build --no-restore --configuration Release
